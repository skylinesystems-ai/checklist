<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FleetCheck Pro V2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f3f5f9;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1e3c72;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.section{
margin-top:20px;
}

.item{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #eee;
}

.dashboard{
margin-top:40px;
padding:20px;
background:#f7f8fb;
border-radius:10px;
}

canvas{
max-width:500px;
margin-top:20px;
}

.preview img{
width:80px;
margin:5px;
border-radius:6px;
}

.prioridadeCritica{color:red;font-weight:bold}
.prioridadeAlta{color:#ff6600}
.prioridadeMedia{color:#caa500}
.prioridadeBaixa{color:#666}

</style>

</head>

<body>

<div class="container">

<h1>FleetCheck Pro V2</h1>

<h2>Checklist</h2>

<input id="nome" placeholder="Motorista">
<input id="veiculo" placeholder="Veículo">
<input id="empresa" placeholder="Empresa">
<input type="date" id="data">

<div id="checklist"></div>

<h3>Fotos</h3>
<input type="file" id="fotos" multiple>
<div class="preview" id="preview"></div>

<h3>Observações</h3>
<textarea id="observacoes"></textarea>

<button onclick="salvarChecklist()">Salvar Checklist</button>
<button onclick="gerarPDF()">Gerar PDF</button>

<div class="section">

<h3>Problemas Detectados</h3>
<ul id="listaProblemas"></ul>

</div>

<div class="dashboard">

<h2>Dashboard da Frota</h2>

<h3>Veículos com mais problemas</h3>
<canvas id="graficoVeiculos"></canvas>

<h3>Problemas mais recorrentes</h3>
<canvas id="graficoProblemas"></canvas>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyBKhszhnGLcwJut7r-yM-n1C_r7Z2BlXwY",
authDomain: "checklist-8d4f8.firebaseapp.com",
databaseURL: "https://checklist-8d4f8-default-rtdb.firebaseio.com",
projectId: "checklist-8d4f8",
storageBucket: "checklist-8d4f8.firebasestorage.app",
messagingSenderId: "380884911116",
appId: "1:380884911116:web:c35b17aafe23ff515b1a29"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ESTRUTURA CHECKLIST */

const estrutura = {

"Geral":["Pneus","Freio","Óleo de motor","Buzina","Painel","Retrovisores"],

"Iluminação":["Farol","Luz freio","Seta","Luz ré"],

"Mecânica":["Embreagem","Radiador","Bateria"]

};

const classificacao = {

"Freio":{tipo:"Corretiva",prioridade:"CRITICA"},
"Óleo de motor":{tipo:"Preditiva",prioridade:"ALTA"},
"Pneus":{tipo:"Preventiva",prioridade:"MEDIA"},
"Luz freio":{tipo:"Corretiva",prioridade:"CRITICA"}

};

const checklistDiv = document.getElementById("checklist");
const listaProblemas = document.getElementById("listaProblemas");

let problemas = [];
let imagens=[];

/* GERAR CHECKLIST */

for(let secao in estrutura){

const h=document.createElement("h3");
h.innerText=secao;
checklistDiv.appendChild(h);

estrutura[secao].forEach(item=>{

const div=document.createElement("div");
div.className="item";

div.innerHTML=`

<span>${item}</span>

<label>OK <input type="radio" name="${item}" value="ok"></label>

<label>Problema <input type="radio" name="${item}" value="problema"></label>

`;

div.querySelectorAll("input")[1].addEventListener("change",()=>registrarProblema(item));

checklistDiv.appendChild(div);

})

}

/* REGISTRAR PROBLEMAS */

function registrarProblema(item){

if(problemas.includes(item))return;

problemas.push(item);

let dados = classificacao[item] || {tipo:"Preventiva",prioridade:"BAIXA"};

const li=document.createElement("li");

li.innerHTML=`
${item} → ${dados.tipo} - 
<span class="prioridade${dados.prioridade}">
${dados.prioridade}
</span>
`;

listaProblemas.appendChild(li);

}

/* PREVIEW IMAGENS */

document.getElementById("fotos").addEventListener("change",function(){

imagens=[...this.files];

const preview=document.getElementById("preview");
preview.innerHTML="";

imagens.forEach(file=>{

const img=document.createElement("img");
img.src=URL.createObjectURL(file);

preview.appendChild(img);

})

});

/* SALVAR CHECKLIST */

window.salvarChecklist = async function(){

const motorista=nome.value;
const veiculo=veiculoInput.value;
const empresa=empresa.value;
const data=dataInput.value;

let fotosUrls=[];

for(const file of imagens){

const storageRef=ref(storage,"fotos/"+file.name);

await uploadBytes(storageRef,file);

const url=await getDownloadURL(storageRef);

fotosUrls.push(url);

}

await addDoc(collection(db,"checklists"),{

motorista,
veiculo,
empresa,
data,
problemas,
observacoes:observacoes.value,
fotos:fotosUrls,
timestamp:Date.now()

});

alert("Checklist salvo!");

carregarDashboard();

}

/* DASHBOARD */

async function carregarDashboard(){

const querySnapshot = await getDocs(collection(db,"checklists"));

let veiculos={};
let problemasStats={};

querySnapshot.forEach(doc=>{

const data=doc.data();

veiculos[data.veiculo]=(veiculos[data.veiculo]||0)+data.problemas.length;

data.problemas.forEach(p=>{
problemasStats[p]=(problemasStats[p]||0)+1;
});

});

criarGrafico("graficoVeiculos",veiculos);
criarGrafico("graficoProblemas",problemasStats);

}

function criarGrafico(id,data){

const ctx=document.getElementById(id);

new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(data),
datasets:[{
label:"Ocorrências",
data:Object.values(data)
}]
}
});

}

carregarDashboard();

/* PDF */

window.gerarPDF=function(){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.text("Checklist Frota",20,20);

doc.text("Motorista: "+nome.value,20,40);
doc.text("Veículo: "+veiculo.value,20,50);

let y=70;

problemas.forEach(p=>{
doc.text("- "+p,20,y);
y+=10;
});

doc.save("checklist.pdf");

}

</script>

</body>
</html>
